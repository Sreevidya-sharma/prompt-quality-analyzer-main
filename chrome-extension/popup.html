<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Prompt Quality Helper</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 13px;
        margin: 12px 14px;
        min-width: 280px;
        color: #0f172a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
        font-weight: 600;
      }
      p {
        margin: 0 0 8px;
        line-height: 1.45;
        color: #475569;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 4px;
      }
      input[type="email"],
      input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 12px;
      }
      button {
        margin-top: 8px;
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        cursor: pointer;
      }
      button:hover {
        background: #f1f5f9;
      }
      #auth-form {
        margin-bottom: 10px;
      }
      #auth-form .row {
        display: flex;
        gap: 8px;
      }
      #login-btn,
      #register-btn {
        flex: 1;
        margin-top: 10px;
        padding: 8px 12px;
        font-weight: 600;
        color: #fff;
      }
      #login-btn {
        border: 1px solid #0d9488;
        background: #14b8a6;
      }
      #login-btn:hover {
        background: #0d9488;
      }
      #register-btn {
        border: 1px solid #0f766e;
        background: #0f766e;
      }
      #register-btn:hover {
        background: #115e59;
      }
      #user-info {
        font-size: 12px;
        color: #0f172a;
        margin: 0 0 10px;
        padding: 8px 10px;
        line-height: 1.4;
        word-break: break-all;
        background: #f1f5f9;
        border-radius: 6px;
        border: 1px solid #e2e8f0;
      }
      #user-info:empty {
        display: none;
      }
      #openDashboard {
        width: 100%;
        margin-bottom: 12px;
        padding: 8px 12px;
        font-weight: 600;
        border: 1px solid #2563eb;
        background: #3b82f6;
        color: #fff;
      }
      #openDashboard:hover {
        background: #2563eb;
      }
      #auth-status {
        font-size: 11px;
        margin: 6px 0 10px;
        min-height: 1.2em;
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1>Prompt Quality Helper</h1>
    <p>
      Type on supported AI sites (OpenAI, Gemini, Claude, Poe, Perplexity).
      Feedback appears after you pause typing.
    </p>

    <div id="auth-form">
      <label for="email">Email</label>
      <input id="email" type="email" spellcheck="false" autocomplete="username" />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" />

      <div class="row">
        <button type="button" id="login-btn">Login</button>
        <button type="button" id="register-btn">Register</button>
      </div>
    </div>

    <div id="auth-status" aria-live="polite"></div>
    <div id="user-info" aria-live="polite"></div>

    <button type="button" id="openDashboard">Open Dashboard</button>

    <script src="user-id.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
